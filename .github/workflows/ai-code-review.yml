name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      # Full history required for merge-base / since-SHA ancestry checks
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # PR branch tip (not merge ref); keeps git log/diff consistent with GITHUB_HEAD_SHA
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build reviewer-runner
        run: npm run build -w reviewer-runner

      - name: Run AI code review
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
          FORCE_COLOR: "1"
          # PR merge-base and head (scope + prepare-diff)
          GITHUB_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          # Tracking comment + inline review commit_id (prefer head over GITHUB_SHA)
          GITHUB_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          # GITHUB_REPOSITORY and GITHUB_EVENT_PATH are provided by Actions by default
        run: npm run review -w reviewer-runner

      - name: Upload AI review run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-review-run-artifacts
          path: .ai-code-review/**/run-artifacts/**
          include-hidden-files: true
          if-no-files-found: warn
